# SonarQube project configuration for ACEest Fitness & Gym
sonar.projectKey=aceest-gym
sonar.projectName=ACEest Fitness & Gym
sonar.projectVersion=1.0

# Source code location
sonar.sources=.
sonar.language=py

# Exclusions
sonar.exclusions=**/tests/**,**/__pycache__/**,**/instance/**,**/*.pyc,**/venv/**

# Test configuration
sonar.tests=tests
sonar.test.inclusions=**/test_*.py

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# SonarQube server (override via Jenkins environment variable)
sonar.host.url=http://localhost:9000
