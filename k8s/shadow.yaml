# SHADOW DEPLOYMENT
# Strategy: Mirror 100% of live traffic to shadow. Shadow responses discarded.
# Production serves real users; shadow receives duplicated requests.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-gym-prod
  namespace: default
  labels:
    app: aceest-gym
    role: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-gym
      role: production
  template:
    metadata:
      labels:
        app: aceest-gym
        role: production
    spec:
      containers:
        - name: aceest-gym
          image: 2024tm93591/aceest-gym:latest
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-gym-shadow
  namespace: default
  labels:
    app: aceest-gym
    role: shadow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-gym
      role: shadow
  template:
    metadata:
      labels:
        app: aceest-gym
        role: shadow
    spec:
      containers:
        - name: aceest-gym
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-gym-prod-svc
  namespace: default
spec:
  selector:
    app: aceest-gym
    role: production
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-gym-shadow-svc
  namespace: default
spec:
  selector:
    app: aceest-gym
    role: shadow
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-gym-shadow-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/mirror-uri: "http://aceest-gym-shadow-svc.default.svc.cluster.local:5000$request_uri"
    nginx.ingress.kubernetes.io/mirror-request-body: "on"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-gym-prod-svc
                port:
                  number: 80
