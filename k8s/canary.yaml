# ─────────────────────────────────────────────────────────────────────────────
# CANARY RELEASE
# Strategy: Route ~33% of traffic to the new version (canary) while 67%
# stays on the stable version. Scale up canary only after validation.
# Both deployments share the same Service selector label (app: aceest-gym).
# Ratio is controlled by replica count: stable=2, canary=1 → 67/33 split.
# Node pool: pool-canary (zone: us-central1-c, label: deploytype=canary)
# Each pod lands on a dedicated canary node — isolated from rolling/bluegreen.
# ─────────────────────────────────────────────────────────────────────────────

# ── STABLE (production, 2 replicas = ~67% traffic) ───────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-gym-stable
  namespace: default
  labels:
    app: aceest-gym
    track: stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-gym
      track: stable
  template:
    metadata:
      labels:
        app: aceest-gym
        track: stable
    spec:
      nodeSelector:
        deploytype: canary
      containers:
        - name: aceest-gym
          image: 2024tm93591/aceest-gym:latest
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# ── CANARY (new version, 1 replica = ~33% traffic) ───────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-gym-canary
  namespace: default
  labels:
    app: aceest-gym
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-gym
      track: canary
  template:
    metadata:
      labels:
        app: aceest-gym
        track: canary
    spec:
      nodeSelector:
        deploytype: canary
      containers:
        - name: aceest-gym
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# ── SHARED SERVICE (routes to both stable + canary) ───────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aceest-gym-canary-svc
  namespace: default
spec:
  selector:
    app: aceest-gym        # matches BOTH stable and canary pods
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
