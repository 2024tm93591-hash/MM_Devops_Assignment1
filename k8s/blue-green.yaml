# BLUE-GREEN DEPLOYMENT
# Strategy: Run two identical deployments (blue=stable, green=new).
# Switch service selector from blue to green after validation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-gym-blue
  namespace: default
  labels:
    app: aceest-gym
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-gym
      version: blue
  template:
    metadata:
      labels:
        app: aceest-gym
        version: blue
    spec:
      containers:
        - name: aceest-gym
          image: 2024tm93591/aceest-gym:latest
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-gym-green
  namespace: default
  labels:
    app: aceest-gym
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-gym
      version: green
  template:
    metadata:
      labels:
        app: aceest-gym
        version: green
    spec:
      containers:
        - name: aceest-gym
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-gym-bg-svc
  namespace: default
spec:
  selector:
    app: aceest-gym
    version: blue
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
